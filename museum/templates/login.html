<html>
<head>
    <title>LOG IN</title>
    <style>
    body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e8edf3, #d9e4ec);
    margin: 0;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

table {
    background: white;
    border: none;
    border-radius: 15px;
    box-shadow: 0px 8px 25px rgba(0,0,0,0.15);
    padding: 20px;
    width: 400px;
}

td {
    padding: 15px;
    font-size: 15px;
    color: #333;
}

td:first-child {
    font-weight: bold;
    color: #1f3a5f;
}

input {
    width: 220px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    border-color: #1f3a5f;
    box-shadow: 0 0 8px rgba(31,58,95,0.3);
    outline: none;
}

button {
    padding: 12px 30px;
    border: none;
    border-radius: 8px;
    background-color: #1f3a5f;
    color: white;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #162a44;
    transform: translateY(-2px);
    box-shadow: 0px 5px 12px rgba(0,0,0,0.2);
}
h2 {
    color: #1f3a5f;
    font-size: 32px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 30px;
    padding-bottom: 10px;
}
</style>
</head>
<body>
    <h2>Login Page</h2>
   <div class="header-container">
    <div class="header-box">
    </div>
</div>
    
    <form method="POST" name="f">
        <table border="4" align="center" cellpadding="5" cellspacing="0">
            
            <tr>
                <td>ID</td>
                <td><input type="text" name="t1"></td>
            </tr>

            <tr>
                <td>PASSWORD</td>
                <td><input type="password" name="t2"></td>
            </tr>
           
            <tr>
                <td colspan="2" align="center">
                    <button type="submit" formaction="/login">LOG IN</button>
                    
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
