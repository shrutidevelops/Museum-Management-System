<html>

<style>
  body {
    background: linear-gradient(135deg, #eaf0f6, #d6e4f0);
    font-family: Arial, sans-serif;
    margin: 0;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1 {
    color: #1f3a5f;
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 40px;
    letter-spacing: 2px;
    text-align: center;
}

form {
    background: white;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.15);

    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    width: 80%;
    max-width: 900px;
}

input[type="submit"] {
    width: 220px;
    padding: 14px;
    font-size: 14px;
    font-weight: bold;
    color: white;
    background-color: #1f3a5f;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
}

input[type="submit"]:hover {
    background-color: #162a44;
    transform: translateY(-3px);
    box-shadow: 0px 5px 12px rgba(0, 0, 0, 0.2);
}
</style>
<body>
