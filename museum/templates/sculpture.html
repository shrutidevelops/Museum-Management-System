<html>
<head>
    <title>SCULPTURE TABLE</title>
    <style>
       body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #dbe7f3);
    margin: 0;
    padding: 30px;
}

h2 {
    text-align: center;
    color: #1f3a5f;
    font-size: 32px;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

table {
    background-color: white;
    border: none;
    border-radius: 15px;
    box-shadow: 0px 8px 25px rgba(0,0,0,0.15);
    padding: 15px;
    width: 550px;
}

td {
    padding: 12px;
    font-size: 15px;
    color: #333;
}

td:first-child {
    font-weight: bold;
    color: #1f3a5f;
}

input {
    width: 220px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus {
    border-color: #1f3a5f;
    box-shadow: 0 0 5px rgba(31,58,95,0.3);
    outline: none;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    background-color: #1f3a5f;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #162a44;
    transform: translateY(-2px);
}

tr:nth-child(even) {
    background-color: #f8fafc;
}
    </style>
</head>
<body>
    <h2>SCULPTURE DETAILS</h2>
    <form method="POST" name="f">
        <table border="4" align="center" cellpadding="5" cellspacing="0">
            
            <tr>
                <td>AN ID</td>
                <td><input type="number" name="t1"></td>
            </tr>

            <tr>
                <td>SCULPTURE NAME</td>
                <td><input type="text" name="t2"></td>
            </tr>

            <tr>
                <td>TOPIC</td>
                <td><input type="text" name="t3"></td>
            </tr>

            <tr>
                <td>COLOR</td>
                <td><input type="text" name="t4"></td>
            </tr>

            <tr>
                <td>WEIGHT</td>
                <td><input type="number" name="t5"></td>
            </tr>

            <tr>
                <td>HEIGHT</td>
                <td><input type="number" name="t6"></td>
            </tr>

            <tr>
                <td>WIDTH</td>
                <td><input type="number" name="t7"></td>
            </tr>

            <tr>
                <td>ARTIST NAME</td>
                <td><input type="text" name="t8"></td>
            </tr>

            <tr>
                <td>CONDITION</td>
                <td><input type="text" name="t9"></td>
            </tr>

            <tr>
                <td>REL PERIOD</td>
                <td><input type="text" name="t10"></td>
            </tr>

            <tr>
                <td>CONTACT DEPT</td>
                <td><input type="text" name="t11"></td>
            </tr>

            <tr>
                <td>CONTACT PERSON</td>
                <td><input type="text" name="t12"></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <button type="button" onclick="new1()">New</button>
                    <button type="submit" formaction="http://127.0.0.1:5018/save">Save</button>
                    <button type="submit" formaction="http://127.0.0.1:5018/update">Update</button>
                    <button type="submit" formaction="http://127.0.0.1:5018/delete">Delete</button>
                    <button type="submit" formaction="http://127.0.0.1:5018/allsearch">Allsearch</button>
                    <button type="submit" formaction="http://127.0.0.1:5018/psearch">PSearch</button>
                    <button type="submit" formaction="http://127.0.0.1:5018/spsearchformopen">Special Search</button>
                    <button type="submit" formaction="http://127.0.0.1:5020/menu">Home</button>
                </td>
            </tr>

        </table>
    </form>

<script>
function new1()
{
    f.t1.value=""
    f.t2.value=""
    f.t3.value=""
    f.t4.value=""
    f.t5.value=""
    f.t6.value=""
    f.t7.value=""
    f.t8.value=""
    f.t9.value=""
    f.t10.value=""
    f.t11.value=""
    f.t12.value=""
}
</script>

</body>
</html>
